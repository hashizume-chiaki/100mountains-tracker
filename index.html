<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>日本百名山 進捗トラッカー</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { color-scheme: light; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f4f7f5;
  color: #1a2e23;
  font-size: 14px;
  line-height: 1.5;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  overflow: hidden;
}

header {
  flex-shrink: 0;
  background: #2d6a4f; color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
.header-main {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; gap: 12px;
}
header h1 { font-size: 1.2rem; font-weight: 700; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#progress-info { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
#progress-text { font-size: 0.8rem; opacity: .9; white-space: nowrap; }
#progress-bar { width: 120px; height: 6px; background: rgba(255,255,255,.3); border-radius: 3px; overflow: hidden; }
#progress-fill { height: 100%; background: #52b788; border-radius: 3px; transition: width .4s ease; }
.icon-btn {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
  color: #fff; border-radius: 6px; width: 36px; height: 36px;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
}
.icon-btn:hover { background: rgba(255,255,255,.25); }

#sync-banner { padding: 6px 16px; font-size: 0.8rem; text-align: center; background: rgba(0,0,0,.2); color: #fff; }
#sync-banner.error   { background: #c0392b; }
#sync-banner.success { background: #27ae60; }
#sync-banner.hidden  { display: none; }

#settings-panel {
  flex-shrink: 0;
  background: #fff; border-bottom: 1px solid #d1d9d3;
  overflow: hidden; max-height: 0; transition: max-height .3s ease;
}
#settings-panel.visible { max-height: 600px; }
#settings-panel.hidden  { display: block; }
.settings-inner { padding: 20px; max-width: 560px; }
.settings-inner h2 { font-size: 1rem; margin-bottom: 8px; color: #2d6a4f; }
.settings-note { font-size: 0.82rem; color: #6b8277; margin-bottom: 16px; line-height: 1.6; }
.settings-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.settings-fields label { display: flex; flex-direction: column; gap: 4px; font-size: 0.82rem; font-weight: 600; color: #1a2e23; }
.settings-fields input {
  padding: 7px 10px; border: 1px solid #d1d9d3; border-radius: 6px;
  font-size: 0.9rem; width: 100%; background: #fff; color: #1a2e23;
}
.settings-fields input:focus { outline: none; border-color: #52b788; }
.settings-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.settings-actions button {
  padding: 7px 14px; border-radius: 6px; border: none;
  cursor: pointer; font-size: 0.85rem; font-weight: 600;
  background: #2d6a4f; color: #fff;
}
.settings-actions button:disabled { opacity: .45; cursor: default; }
.settings-actions button:not(:disabled):hover { opacity: .85; }
.settings-actions button.secondary { background: #f4f7f5; color: #1a2e23; border: 1px solid #d1d9d3; }
.settings-actions button.secondary:hover { background: #d1d9d3; }
#settings-status { margin-top: 10px; font-size: 0.82rem; min-height: 18px; }
#settings-status.ok  { color: #155724; }
#settings-status.err { color: #721c24; }

#controls {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; background: #fff;
  border-bottom: 1px solid #d1d9d3; flex-wrap: wrap;
  box-shadow: 0 2px 4px rgba(0,0,0,.06);
}
#search-input {
  flex: 1; min-width: 160px; padding: 7px 10px;
  border: 1px solid #d1d9d3; border-radius: 6px;
  font-size: 0.9rem; background: #fff; color: #1a2e23;
}
#search-input:focus { outline: none; border-color: #52b788; }
.filter-check { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
.filter-check input[type="checkbox"] { width: 15px; height: 15px; accent-color: #2d6a4f; cursor: pointer; }

#table-wrapper { flex: 1; overflow: auto; min-height: 0; -webkit-overflow-scrolling: touch; }
#mountains-table { width: 100%; border-collapse: collapse; min-width: 600px; }
#mountains-table thead {
  background: #fff; border-bottom: 2px solid #52b788;
  position: sticky; top: 0; z-index: 10;
}
#mountains-table th {
  padding: 10px 8px; text-align: left; font-size: 0.8rem;
  font-weight: 700; color: #6b8277; white-space: nowrap;
  border-bottom: 2px solid #52b788; user-select: none;
}
th[data-col] { cursor: pointer; }
th[data-col]:hover { color: #2d6a4f; }
th[data-col].sort-asc::after  { content: " ▲"; color: #2d6a4f; }
th[data-col].sort-desc::after { content: " ▼"; color: #2d6a4f; }
.col-id { width: 44px; } .col-elevation { width: 88px; }
.col-prefecture { width: 100px; } .col-difficulty { width: 72px; text-align: center; }
.col-climbed { width: 52px; text-align: center; } .col-date { width: 130px; }

#mountains-table tbody tr { border-bottom: 1px solid #d1d9d3; background: #fff; }
#mountains-table tbody tr:hover { background: #d8f3dc; }
#mountains-table tbody tr.climbed { background: #edf7f0; }
#mountains-table tbody tr.climbed:hover { background: #d8f0e3; }
#mountains-table td { padding: 8px; font-size: 0.88rem; color: #1a2e23; }
.td-id { color: #6b8277; font-size: 0.8rem; }
.td-name { font-weight: 500; }
.td-center { text-align: center; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 700; }
.diff-A { background: #d4edda; color: #155724; }
.diff-B { background: #cce5ff; color: #004085; }
.diff-C { background: #fff3cd; color: #856404; }
.diff-D { background: #f8d7da; color: #721c24; }
.diff-E { background: #e2d9f3; color: #432874; }

.climbed-check { width: 18px; height: 18px; accent-color: #2d6a4f; cursor: pointer; }
.date-input {
  border: 1px solid #d1d9d3; border-radius: 4px;
  padding: 3px 6px; font-size: 0.82rem; width: 122px;
  font-family: inherit; background: #fff; color: #1a2e23;
}
.date-input:focus { outline: none; border-color: #52b788; }
.date-input:disabled { background: transparent; border-color: transparent; color: #6b8277; cursor: default; }

#empty-state { text-align: center; padding: 40px; color: #6b8277; font-size: 0.9rem; }

/* ── Mobile ────────────────────────────────────────── */
@media (max-width: 600px) {
  body { font-size: 13px; }
  .header-main { padding: 8px 12px; gap: 8px; }
  header h1 { font-size: 1rem; }
  #progress-bar { width: 70px; }
  #progress-text { font-size: 0.75rem; }

  #controls { padding: 8px 10px; gap: 8px; }
  #search-input { font-size: 0.85rem; }

  .settings-inner { padding: 14px; }
  .settings-actions { flex-direction: column; }
  .settings-actions button { width: 100%; }

  /* テーブル: 標高・都道府県・登頂日を非表示にしてチェックボックスを見えやすく */
  #mountains-table { min-width: unset; width: 100%; }
  #mountains-table th:nth-child(3),
  #mountains-table td:nth-child(3),
  #mountains-table th:nth-child(4),
  #mountains-table td:nth-child(4),
  #mountains-table th:nth-child(7),
  #mountains-table td:nth-child(7) { display: none; }

  /* 表示列: # / 山名 / 難易度 / 登頂チェック */
  #mountains-table th { padding: 8px 6px; font-size: 0.75rem; }
  #mountains-table td { padding: 10px 6px; }
  .td-name { font-size: 0.9rem; }

  /* チェックボックスを大きくしてタップしやすく */
  .climbed-check { width: 24px; height: 24px; }
  .col-climbed { width: 48px; }
  .col-id { width: 32px; }
  .col-difficulty { width: 56px; }
}

// ─── State ───────────────────────────────────────────────────────────────────
let progress = {};
let currentSha = null;
let sortState = { col: 'id', dir: 'asc' };
let filterText = '';
let filterUnclimbed = false;
let saveTimer = null;
let isSaving = false;

// ─── GitHub API ───────────────────────────────────────────────────────────────
const GH_API = 'https://api.github.com';

function ghConfig() {
  return {
    pat:   localStorage.getItem('gh_pat')   || '',
    owner: localStorage.getItem('gh_owner') || '',
    repo:  localStorage.getItem('gh_repo')  || '',
    path:  'data/progress.json',
  };
}

function ghHeaders(cfg) {
  return {
    'Authorization': `Bearer ${cfg.pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json',
  };
}

async function fetchProgress() {
  const cfg = ghConfig();
  if (!cfg.pat || !cfg.owner || !cfg.repo) return false;
  const url = `${GH_API}/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
  try {
    const res = await fetch(url, { headers: ghHeaders(cfg) });
    if (res.status === 404) { currentSha = null; return true; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    currentSha = data.sha;
    const json = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
    progress = json.entries || {};
    return true;
  } catch (e) {
    console.error('fetchProgress:', e);
    return false;
  }
}

async function saveProgress() {
  const cfg = ghConfig();
  if (!cfg.pat || !cfg.owner || !cfg.repo) return;
  if (isSaving) { scheduleAutoSave(200); return; }
  isSaving = true;
  showBanner('同期中...', '');
  const payload = { version: 1, lastUpdated: new Date().toISOString(), entries: progress };
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const body = { message: 'chore: update climbing progress [skip ci]', content, ...(currentSha ? { sha: currentSha } : {}) };
  const url = `${GH_API}/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
  try {
    const res = await fetch(url, { method: 'PUT', headers: ghHeaders(cfg), body: JSON.stringify(body) });
    if (res.status === 409) { await fetchProgress(); isSaving = false; scheduleAutoSave(100); return; }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
    const result = await res.json();
    currentSha = result.content.sha;
    showBanner('同期完了 ✓', 'success');
    setTimeout(hideBanner, 2500);
  } catch (e) {
    console.error('saveProgress:', e);
    showBanner(`同期失敗: ${e.message}`, 'error');
  } finally {
    isSaving = false;
  }
}

function scheduleAutoSave(delay = 800) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveProgress, delay);
}

// ─── Settings ─────────────────────────────────────────────────────────────────
async function testConnection() {
  const cfg = ghConfig();
  if (!cfg.pat || !cfg.owner || !cfg.repo) return false;
  try {
    const res = await fetch(`${GH_API}/repos/${cfg.owner}/${cfg.repo}`, { headers: ghHeaders(cfg) });
    return res.ok;
  } catch { return false; }
}

document.getElementById('save-settings-btn').addEventListener('click', async () => {
  const owner = document.getElementById('owner-input').value.trim();
  const repo  = document.getElementById('repo-input').value.trim();
  const pat   = document.getElementById('pat-input').value.trim();
  const statusEl = document.getElementById('settings-status');
  if (!owner || !repo || !pat) { setStatus(statusEl, '全てのフィールドを入力してください', 'err'); return; }
  localStorage.setItem('gh_owner', owner);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_pat', pat);
  setStatus(statusEl, '接続テスト中...', '');
  document.getElementById('save-settings-btn').disabled = true;
  const ok = await testConnection();
  document.getElementById('save-settings-btn').disabled = false;
  if (ok) {
    setStatus(statusEl, '接続成功 ✓ データを読み込んでいます...', 'ok');
    document.getElementById('sync-now-btn').disabled = false;
    const fetched = await fetchProgress();
    setStatus(statusEl, fetched ? '接続成功 ✓ データを読み込みました' : '接続成功 ✓（データファイルはまだありません）', 'ok');
    renderTable(); updateProgressBar();
  } else {
    setStatus(statusEl, '接続失敗 — ユーザー名・リポジトリ名・Tokenを確認してください', 'err');
    document.getElementById('sync-now-btn').disabled = true;
  }
});

document.getElementById('sync-now-btn').addEventListener('click', async () => {
  const ok = await fetchProgress();
  if (ok) { renderTable(); updateProgressBar(); showBanner('同期完了 ✓', 'success'); setTimeout(hideBanner, 2500); }
  else showBanner('同期失敗', 'error');
});

document.getElementById('settings-btn').addEventListener('click', () => {
  const p = document.getElementById('settings-panel');
  p.classList.toggle('visible');
  p.classList.remove('hidden');
});

document.getElementById('close-settings-btn').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('visible');
});

// ─── Sort / Filter ────────────────────────────────────────────────────────────
const COMPARATORS = {
  id:         (a, b) => a.id - b.id,
  name:       (a, b) => a.name.localeCompare(b.name, 'ja'),
  elevation:  (a, b) => a.elevation - b.elevation,
  prefecture: (a, b) => a.prefecture.localeCompare(b.prefecture, 'ja'),
  difficulty: (a, b) => a.difficulty.localeCompare(b.difficulty),
  climbed:    (a, b) => (progress[a.id]?.climbed ? 1 : 0) - (progress[b.id]?.climbed ? 1 : 0),
  date:       (a, b) => (progress[a.id]?.date || '').localeCompare(progress[b.id]?.date || ''),
};

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortState.dir = (sortState.col === col && sortState.dir === 'asc') ? 'desc' : 'asc';
    sortState.col = col;
    renderTable();
  });
});

function getSortedFiltered() {
  const q = filterText.toLowerCase();
  return MOUNTAINS
    .filter(m => {
      if (filterUnclimbed && progress[m.id]?.climbed) return false;
      if (q && !m.name.includes(q) && !m.prefecture.includes(q)) return false;
      return true;
    })
    .sort((a, b) => {
      const cmp = COMPARATORS[sortState.col](a, b);
      return sortState.dir === 'asc' ? cmp : -cmp;
    });
}

document.getElementById('search-input').addEventListener('input', e => { filterText = e.target.value.trim(); renderTable(); });
document.getElementById('filter-unclimbed').addEventListener('change', e => { filterUnclimbed = e.target.checked; renderTable(); });

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTable() {
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortState.col) th.classList.add(`sort-${sortState.dir}`);
  });

  const tbody = document.getElementById('table-body');
  const data = getSortedFiltered();

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div id="empty-state">該当する山がありません</div></td></tr>';
    return;
  }

  const frag = document.createDocumentFragment();
  for (const m of data) {
    const p = progress[m.id] || {};
    const climbed = !!p.climbed;
    const date = p.date || '';
    const tr = document.createElement('tr');
    if (climbed) tr.className = 'climbed';
    tr.innerHTML =
      `<td class="td-id td-center">${m.id}</td>` +
      `<td class="td-name">${esc(m.name)}</td>` +
      `<td>${m.elevation.toLocaleString('ja-JP')}</td>` +
      `<td>${esc(m.prefecture)}</td>` +
      `<td class="td-center"><span class="badge diff-${m.difficulty}">${m.difficulty}</span></td>` +
      `<td class="td-center"><input type="checkbox" class="climbed-check" data-id="${m.id}"${climbed ? ' checked' : ''}></td>` +
      `<td><input type="date" class="date-input" data-id="${m.id}" value="${esc(date)}"${!climbed ? ' disabled' : ''}></td>`;
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

function updateProgressBar() {
  const done = MOUNTAINS.filter(m => progress[m.id]?.climbed).length;
  document.getElementById('progress-text').textContent = `登頂済み: ${done} / ${MOUNTAINS.length}`;
  document.getElementById('progress-fill').style.width = `${(done / MOUNTAINS.length * 100).toFixed(1)}%`;
}

document.getElementById('table-body').addEventListener('change', e => {
  const el = e.target;
  const id = Number(el.dataset.id);
  if (!id) return;
  if (!progress[id]) progress[id] = {};
  if (el.type === 'checkbox') {
    progress[id].climbed = el.checked;
    if (!el.checked) progress[id].date = null;
    renderTable(); updateProgressBar(); scheduleAutoSave();
  } else if (el.type === 'date') {
    progress[id].date = el.value || null;
    scheduleAutoSave();
  }
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
function showBanner(msg, type) {
  const b = document.getElementById('sync-banner');
  b.textContent = msg; b.className = type || ''; b.classList.remove('hidden');
}
function hideBanner() { document.getElementById('sync-banner').classList.add('hidden'); }
function setStatus(el, msg, cls) { el.textContent = msg; el.className = cls; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const owner = localStorage.getItem('gh_owner') || '';
  const repo  = localStorage.getItem('gh_repo')  || '';
  const pat   = localStorage.getItem('gh_pat')   || '';
  document.getElementById('owner-input').value = owner;
  document.getElementById('repo-input').value  = repo;
  if (pat) document.getElementById('pat-input').placeholder = '（設定済み）';

  if (owner && repo && pat) {
    document.getElementById('sync-now-btn').disabled = false;
    showBanner('GitHubからデータを読み込み中...', '');
    const ok = await fetchProgress();
    ok ? hideBanner() : showBanner('GitHub同期に失敗しました — 設定を確認してください', 'error');
  } else {
    showBanner('⚙ 右上の設定ボタンからGitHub同期を設定すると、データが保存・同期されます', '');
  }
  renderTable();
  updateProgressBar();
}

init();
